aid: yards-brewing
name: Yards Brewing
description: >-
  Yards Brewing Company is an independent craft brewery founded in 1995 and
  headquartered in Philadelphia, Pennsylvania. Yards operates a brewery and
  taproom at 500 Spring Garden Street and distributes its classic and seasonal
  beers across the Mid-Atlantic. The company emphasizes local craftsmanship,
  community, and Philadelphia identity, summed up in their tagline that things
  are not made in Philadelphia but made BY Philadelphia.
